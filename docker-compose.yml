services:
  configsvr:
    image: mongo:7
    command: >
      mongod --configsvr
             --replSet configReplSet
             --port 27019
             --bind_ip_all
    ports:
      - 27019:27019
    volumes:
      - configdb:/data/db

  shard1:
    image: mongo:7
    command: >
      mongod --shardsvr
             --replSet shard1ReplSet
             --port 27018
             --bind_ip_all
    ports:
      - 27018:27018
    volumes:
      - shard1:/data/db

  shard2:
    image: mongo:7
    command: >
      mongod --shardsvr
             --replSet shard2ReplSet
             --port 27017
             --bind_ip_all
    ports:
      - 27017:27017
    volumes:
      - shard2:/data/db

  mongos:
    image: mongo:7
    command: >
      mongos --configdb configReplSet/configsvr:27019
             --bind_ip_all
    ports:
      - 27020:27017
    depends_on:
      - configsvr
      - shard1
      - shard2

volumes:
  configdb:
  shard1:
  shard2: